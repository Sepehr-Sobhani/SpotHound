# Single-box production stack: Postgres + backend (Playwright/xvfb) + Caddy.
# Caddy serves the built React app and reverse-proxies /api/* to the backend.
# Run with: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spothound
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spothound}
      POSTGRES_DB: spothound
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env.prod
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
